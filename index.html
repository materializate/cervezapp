<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CervezApp — ¿Qué cerveza tenéis?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --gold:#C4870A;--dark:#1A1208;
  --panel:#FFFDF8;--panel2:#F5EFE3;--panel3:#EDE4D0;
  --border:rgba(180,140,60,0.2);--border2:rgba(180,140,60,0.38);
  --text:#1A1208;--muted:#7A6A50;--r:14px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:'DM Sans',sans-serif;background:var(--panel);color:var(--text)}

#map{position:fixed;inset:0;z-index:0}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:linear-gradient(to bottom,rgba(255,253,248,.98) 65%,transparent);
  pointer-events:none;
}
.topbar>*{pointer-events:auto}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{font-size:24px;filter:drop-shadow(0 1px 3px rgba(180,120,0,.4))}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold);line-height:1}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.topbar-btns{display:flex;gap:8px}
.icon-btn{
  height:36px;border-radius:20px;
  background:rgba(255,253,248,.97);
  border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;transition:all .15s;padding:0 14px;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.icon-btn:hover{background:var(--gold);color:white;border-color:var(--gold)}
.icon-btn.round{width:36px;height:36px;border-radius:50%;padding:0}

/* ── SEARCH ── */
.searchbar{position:fixed;top:58px;left:12px;right:12px;z-index:100}
.search-wrap{position:relative}
.search-input{
  width:100%;background:rgba(255,253,248,.98);
  border:1px solid var(--border2);border-radius:12px;
  padding:10px 14px 10px 36px;
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;
  transition:border-color .2s;box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--muted)}

/* ── FILTER PILLS ── */
.filter-row{
  position:fixed;top:108px;left:0;right:0;z-index:100;
  display:flex;gap:6px;padding:0 12px;
  overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;
}
.filter-row::-webkit-scrollbar{display:none}
.pill{
  display:flex;align-items:center;gap:5px;padding:5px 10px 5px 5px;border-radius:20px;
  background:rgba(255,253,248,.97);border:1.5px solid var(--border);
  color:var(--muted);font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;
  transition:all .15s;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.pill.on{color:var(--text);border-color:var(--border2);background:white}
.pill-logo{width:22px;height:16px;border-radius:3px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pill-logo svg{width:100%;height:100%}

/* ── STATS ── */
.stats-chip{
  position:fixed;bottom:220px;right:12px;z-index:100;
  background:rgba(255,253,248,.97);
  border:1px solid var(--border2);border-radius:12px;
  padding:8px 12px;display:flex;gap:12px;
  transition:bottom .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 2px 12px rgba(0,0,0,.1);
}
.sv{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--gold);line-height:1;text-align:center}
.sl{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;text-align:center}

/* ── LOADING OVERLAY ── */
.loading-screen{
  position:fixed;inset:0;z-index:500;
  background:rgba(255,253,248,.95);backdrop-filter:blur(4px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  transition:opacity .4s;
}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;color:var(--gold)}
.loading-sub{font-size:13px;color:var(--muted);letter-spacing:1px}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-err{color:#e63946;font-size:13px;text-align:center;max-width:280px;line-height:1.5}

/* ── BOTTOM SHEET ── */
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--panel);border-radius:var(--r) var(--r) 0 0;
  border-top:1px solid var(--border2);
  box-shadow:0 -4px 24px rgba(0,0,0,.1);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;max-height:85vh;
  transform:translateY(calc(100% - 64px))
}
.sheet.mid{transform:translateY(calc(100% - 280px))}
.sheet.full{transform:translateY(0)}
.sh-handle{display:flex;flex-direction:column;align-items:center;padding:10px 16px 0;cursor:grab;flex-shrink:0;user-select:none}
.sh-bar{width:36px;height:4px;background:var(--border2);border-radius:2px;margin-bottom:10px}
.sh-title-row{width:100%;display:flex;align-items:center;justify-content:space-between;padding-bottom:10px}
.sh-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--gold)}
.sh-count{font-size:12px;color:var(--muted)}
.sh-body{overflow-y:auto;flex:1;padding:0 8px 24px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sh-body::-webkit-scrollbar{width:3px}
.sh-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── BAR CARDS ── */
.bcard{
  display:flex;align-items:center;gap:11px;padding:10px 8px;
  border-radius:10px;cursor:pointer;transition:background .12s;
  border:1px solid transparent;margin-bottom:2px;
}
.bcard:hover,.bcard:active{background:var(--panel2)}
.bcard.sel{background:var(--panel2);border-color:var(--border2)}
.bcard-ico{width:44px;height:28px;border-radius:6px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.bcard-ico svg{width:100%;height:100%}
.bcard-info{flex:1;min-width:0}
.bcard-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bcard-meta{display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap}
.bcard-brand{font-size:10px;font-weight:600;padding:1px 6px;border-radius:20px}
.bcard-city{font-size:11px;color:var(--muted)}
.bcard-user{font-size:10px;color:var(--gold);font-style:italic;margin-top:1px}
.no-res{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px}
.no-res-ic{font-size:36px;margin-bottom:8px}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.4);
  backdrop-filter:blur(3px);display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:auto}
.modal{
  width:100%;background:var(--panel);
  border-radius:var(--r) var(--r) 0 0;border-top:1px solid var(--border2);
  padding:20px 18px 36px;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:92vh;overflow-y:auto;
}
.overlay.open .modal{transform:translateY(0)}
.m-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.m-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1.5px;color:var(--gold)}
.m-close{width:32px;height:32px;border-radius:50%;background:var(--panel2);border:1px solid var(--border);color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.m-close:hover{background:var(--panel3);color:var(--text)}
.fg{margin-bottom:14px}
.fl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.fi{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--muted)}
.brand-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bopt{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px 8px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;background:var(--panel2)}
.bopt.sel{border-color:var(--gold);background:rgba(196,135,10,.06)}
.bopt-label{width:56px;height:36px;border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.bopt-label svg{width:100%;height:100%}
.bopt-nm{font-size:9px;text-align:center;color:var(--muted);line-height:1.2;max-width:70px}
.bopt.sel .bopt-nm{color:var(--gold);font-weight:600}
.loc-btn{width:100%;padding:11px;background:var(--panel2);border:1px dashed var(--border2);border-radius:10px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.loc-btn:hover{border-color:var(--gold);color:var(--gold)}
.loc-btn.loading{color:var(--gold);border-color:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.coord-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.hint{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4}
.ferr{font-size:11px;color:#e63946;margin-top:4px;min-height:16px}
.submit{width:100%;padding:14px;background:var(--gold);border:none;border-radius:12px;color:white;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;cursor:pointer;transition:all .15s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.submit:hover:not(:disabled){background:#D4970A;transform:translateY(-1px)}
.submit:disabled{opacity:.5;cursor:not-allowed}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{background:var(--panel)!important;border:1px solid var(--border2)!important;border-radius:14px!important;box-shadow:0 8px 30px rgba(0,0,0,.15)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:240px!important}
.leaflet-popup-tip{background:var(--panel)!important}
.leaflet-popup-close-button{color:var(--muted)!important;top:8px!important;right:10px!important;font-size:18px!important;z-index:10}
.leaflet-popup-close-button:hover{color:var(--gold)!important}
.pu{padding:14px}
.pu-brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.pu-logo-wrap{width:64px;height:40px;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pu-logo-wrap svg{width:100%;height:100%}
.pu-bname{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;line-height:1}
.pu-orig{font-size:11px;color:var(--muted);margin-top:2px}
.pu-hr{height:1px;background:var(--border);margin:8px 0}
.pu-name{font-weight:600;font-size:14px;margin-bottom:3px}
.pu-addr{font-size:12px;color:var(--muted);margin-bottom:6px}
.pu-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.pu-tag{padding:2px 8px;background:var(--panel2);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--muted)}
.pu-date{font-size:10px;color:var(--muted);margin-top:4px}

/* selector de marca en popup */
.pu-assign{margin-top:8px}
.pu-assign-title{font-size:11px;font-weight:600;color:var(--text);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.pu-brands{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.pu-brand-opt{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 4px;border-radius:8px;border:1.5px solid var(--border);
  cursor:pointer;transition:all .15s;background:var(--panel2);
}
.pu-brand-opt:hover{border-color:var(--gold);background:var(--panel)}
.pu-brand-opt.pu-sel{border-color:var(--gold);background:rgba(196,135,10,.08)}
.pu-brand-opt svg{border-radius:3px}
.pu-brand-opt-name{font-size:8px;text-align:center;color:var(--muted);line-height:1.2}
.pu-brand-opt.pu-sel .pu-brand-opt-name{color:var(--gold);font-weight:600}
.pu-save-btn{
  width:100%;padding:8px;background:var(--gold);border:none;border-radius:8px;
  color:white;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:1px;
  cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.pu-save-btn:hover:not(:disabled){background:#D4970A}
.pu-save-btn:disabled{opacity:.4;cursor:not-allowed}
.pu-change-btn{
  width:100%;padding:6px;background:none;border:1px solid var(--border2);border-radius:8px;
  color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;
  cursor:pointer;transition:all .15s;margin-top:5px;
}
.pu-change-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:600;background:white;border:1.5px solid var(--gold);border-radius:24px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--gold);opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:#e63946;color:#e63946}

/* ── DESKTOP ── */
@media(min-width:768px){
  .sheet{display:none!important}
  .searchbar,.filter-row,.topbar,.stats-chip{display:none!important}
  #map{left:300px}
  .desktop-sidebar{
    display:flex!important;flex-direction:column;
    position:fixed;top:0;left:0;bottom:0;width:300px;z-index:150;
    background:var(--panel);border-right:1px solid var(--border2);overflow:hidden;
    box-shadow:2px 0 16px rgba(0,0,0,.07);
  }
  .ds-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
  .ds-logo{display:flex;flex-direction:column}
  .ds-logo-text{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--gold);line-height:1}
  .ds-logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .ds-search{padding:10px 12px 0;flex-shrink:0}
  .ds-filters{padding:8px 10px 0;display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;border-bottom:1px solid var(--border);padding-bottom:10px}
  .ds-filters .pill{font-size:10px;padding:3px 8px 3px 4px}
  .ds-list-hdr{padding:10px 16px 4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .ds-list-hdr span:last-child{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)}
  .ds-list{flex:1;overflow-y:auto;padding:4px 8px 16px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
  .ds-list::-webkit-scrollbar{width:3px}
  .ds-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .ds-bottom{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px;flex-shrink:0}
  .ds-stats{display:flex;gap:16px}
  .add-btn-full{width:100%;padding:11px;background:var(--gold);border:none;border-radius:10px;color:white;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
  .add-btn-full:hover{background:#D4970A}
  .overlay{align-items:center}
  .modal{border-radius:var(--r);max-width:480px;margin:auto;width:480px}
  .brand-grid{grid-template-columns:repeat(4,1fr)}
}
.desktop-sidebar{display:none}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-logo">🍺 CervezApp</div>
  <div style="font-size:13px;color:var(--muted);letter-spacing:0.5px;font-style:italic;margin-top:-10px">¿Qué cerveza tenéis?</div>
  <div class="loading-spinner"></div>
  <div class="loading-sub">Cargando bares de España…</div>
  <div class="loading-err" id="loading-err" style="display:none"></div>
</div>

<div id="map"></div>
<div class="toast" id="toast"></div>

<div class="stats-chip" id="stats-chip">
  <div><div class="sv" id="sb">0</div><div class="sl">Bares</div></div>
  <div><div class="sv" id="sm">0</div><div class="sl">Marcas</div></div>
</div>

<!-- ═══ DESKTOP SIDEBAR ═══ -->
<div class="desktop-sidebar" id="ds">
  <div class="ds-top">
    <div class="ds-logo">
      <div class="ds-logo-text">🍺 CervezApp</div>
      <div class="ds-logo-sub">¿Qué cerveza tenéis?</div>
    </div>
  </div>
  <div class="ds-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="sq-ds" placeholder="Buscar bar o ciudad…" autocomplete="off" style="width:100%"/>
    </div>
  </div>
  <div class="ds-filters" id="pills-ds"></div>
  <div class="ds-list-hdr"><span>Bares</span><span id="ds-cnt">0</span></div>
  <div class="ds-list" id="ds-list"></div>
  <div class="ds-bottom">
    <div class="ds-stats">
      <div><div class="sv" id="ds-sb">0</div><div class="sl">Bares</div></div>
      <div><div class="sv" id="ds-sm">0</div><div class="sl">Marcas</div></div>
      <div><div class="sv" id="ds-sc">0</div><div class="sl">Ciudades</div></div>
    </div>
    <button class="add-btn-full" id="add-ds">＋ Añadir bar</button>
  </div>
</div>

<!-- ═══ MOBILE TOPBAR ═══ -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🍺</div>
    <div>
      <div class="logo-text">CervezApp</div>
      <div class="logo-sub">¿Qué cerveza tenéis?</div>
    </div>
  </div>
  <div class="topbar-btns">
    <button class="icon-btn" id="add-mob">＋ Añadir</button>
    <button class="icon-btn round" id="loc-mob" title="Mi ubicación">◎</button>
  </div>
</div>
<div class="searchbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="sq-mob" placeholder="Buscar bar o ciudad…" autocomplete="off"/>
  </div>
</div>
<div class="filter-row" id="pills-mob"></div>

<!-- ═══ BOTTOM SHEET ═══ -->
<div class="sheet mid" id="sheet">
  <div class="sh-handle" id="sh-handle">
    <div class="sh-bar"></div>
    <div class="sh-title-row">
      <span class="sh-title">🍺 Bares</span>
      <span class="sh-count" id="sh-cnt">cargando…</span>
    </div>
  </div>
  <div class="sh-body" id="sh-body"></div>
</div>

<!-- ═══ MODAL AÑADIR BAR ═══ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-header">
      <div class="m-title">🍻 Añadir Bar</div>
      <button class="m-close" id="m-close">✕</button>
    </div>
    <div class="fg">
      <label class="fl">Nombre del bar *</label>
      <input class="fi" id="fn" placeholder="Ej: Bar El Patio" autocomplete="off"/>
      <div class="ferr" id="en"></div>
    </div>
    <div class="fg">
      <label class="fl">Cerveza de barril *</label>
      <div class="brand-grid" id="bsel"></div>
      <div class="ferr" id="eb"></div>
    </div>
    <div class="fg">
      <label class="fl">Ciudad *</label>
      <input class="fi" id="fci" placeholder="Ej: Madrid" autocomplete="off"/>
      <div class="ferr" id="eci"></div>

function allBars() { return dbBars; }
function filtered() {
  return allBars().filter(b => {
    const brandOk = b.brand ? filters.has(b.brand) : filters.has('__unknown__');
    const searchOk = !sq || b.name.toLowerCase().includes(sq.toLowerCase()) || b.city.toLowerCase().includes(sq.toLowerCase());
    return brandOk && searchOk;
  });
}
function $(i) { return document.getElementById(i); }
let _tt;
function toast(m, err=false) {
  const t = $("toast");
  t.textContent = m;
  t.className = "toast" + (err ? " err" : "");
  t.classList.add("show");
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove("show"), 3500);
}

// ══════════════════════════════════════════════════════════
// MAP
// ══════════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', { center: [40.4168, -3.7038], zoom: 6, zoomControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.on('click', e => {
    pendLL = e.latlng;
    $('flat').value = e.latlng.lat.toFixed(5);
    $('flng').value = e.latlng.lng.toFixed(5);
    toast('📍 Ubicación marcada — pulsa Añadir bar para continuar');
  });
}

// Logo genérico para bares sin marca asignada
const UNKNOWN_LOGO = (w,h) => `<svg width="${w}" height="${h}" viewBox="0 0 56 36" xmlns="http://www.w3.org/2000/svg">
  <rect width="56" height="36" rx="5" fill="#5A4A3A"/>
  <rect x="2" y="2" width="52" height="32" rx="4" fill="#6B5A48"/>
  <text x="28" y="14" font-family="Arial,sans-serif" font-size="14" fill="#D4B896" text-anchor="middle" dominant-baseline="middle">🍺</text>
  <text x="28" y="28" font-family="Arial,sans-serif" font-size="6" fill="#D4B896" text-anchor="middle" dominant-baseline="middle" letter-spacing="0.5">SIN ASIGNAR</text>
</svg>`;

const UNKNOWN_BRAND = { name:"Sin asignar", c:"#8A7060", bg:"#3A2A1A", o:"—", logo:UNKNOWN_LOGO };

function getBrand(bk) { return (bk && B[bk]) ? B[bk] : UNKNOWN_BRAND; }

function mkIcon(bk) {
  const b = getBrand(bk);
  const W = 46, H = 30;
  const svg = b.logo(W, H);
  const opacity = bk ? '1' : '0.65';
  return L.divIcon({
    html: `<div style="width:${W}px;height:${H}px;border-radius:5px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.35),0 0 0 1.5px ${b.c}88;cursor:pointer;opacity:${opacity}">${svg}</div>`,
    className: '', iconSize: [W, H], iconAnchor: [W/2, H/2], popupAnchor: [0, -(H/2+6)]
  });
}

function puHTML(bar) {
  const b = getBrand(bar.brand);
  const tags = (bar.tags || []).map(t => `<span class="pu-tag">${t}</span>`).join('');
  const fecha = bar.at ? new Date(bar.at).toLocaleDateString('es-ES', {day:'numeric',month:'short',year:'numeric'}) : '';

  // Selector de marcas
  const brandOpts = Object.entries(B).map(([k, bx]) => `
    <div class="pu-brand-opt${bar.brand===k?' pu-sel':''}" data-brand="${k}" data-barid="${bar.id}">
      <div style="border-radius:3px;overflow:hidden;width:36px;height:23px">${bx.logo(36,23)}</div>
      <div class="pu-brand-opt-name">${bx.name}</div>
    </div>`).join('');

  const assignSection = `
    <div class="pu-assign" id="pu-assign-${bar.id}">
      ${!bar.brand ? `<div class="pu-assign-title">🍺 ¿Qué cerveza sirven?</div>` : `<div class="pu-assign-title">✏️ Cambiar cerveza</div>`}
      <div class="pu-brands">${brandOpts}</div>
      <button class="pu-save-btn" id="pu-save-${bar.id}" disabled>GUARDAR</button>
    </div>
    ${bar.brand ? `<button class="pu-change-btn" id="pu-toggle-${bar.id}">✏️ Cambiar cerveza</button>` : ''}
  `;

  return `<div class="pu">
    <div class="pu-brand">
      <div class="pu-logo-wrap" style="background:${b.bg};border:1px solid ${b.c}40">${b.logo(64,40)}</div>
      <div><div class="pu-bname" style="color:${b.c}">${b.name}</div><div class="pu-orig">${bar.brand ? '🏭 '+b.o : '📍 '+bar.city}</div></div>
    </div>
    <div class="pu-hr"></div>
    <div class="pu-name">🍻 ${bar.name}</div>
    <div class="pu-addr">${bar.address ? bar.address+', ' : ''}${bar.city}</div>
    ${tags ? `<div class="pu-tags">${tags}</div>` : ''}
    ${fecha ? `<div class="pu-date">Añadido el ${fecha}</div>` : ''}
    <div class="pu-hr"></div>
    ${assignSection}
  </div>`;
}

function bindPopupEvents(bar, popup) {
  // Espera a que el popup esté en el DOM
  popup.on('add', () => {
    let pendingBrand = bar.brand || null;

    // Botón "Cambiar cerveza" (solo bares con marca ya asignada)
    const toggleBtn = document.getElementById(`pu-toggle-${bar.id}`);
    const assignDiv = document.getElementById(`pu-assign-${bar.id}`);
    if (toggleBtn && assignDiv) {
      assignDiv.style.display = 'none';
      toggleBtn.addEventListener('click', () => {
        assignDiv.style.display = 'block';
        toggleBtn.style.display = 'none';
      });
    }

    // Opciones de marca
    document.querySelectorAll(`.pu-brand-opt[data-barid="${bar.id}"]`).forEach(opt => {
      opt.addEventListener('click', () => {
        pendingBrand = opt.dataset.brand;
        document.querySelectorAll(`.pu-brand-opt[data-barid="${bar.id}"]`).forEach(o => o.classList.remove('pu-sel'));
        opt.classList.add('pu-sel');
        const saveBtn = document.getElementById(`pu-save-${bar.id}`);
        if (saveBtn) saveBtn.disabled = (pendingBrand === bar.brand);
      });
    });

    // Botón guardar
    const saveBtn = document.getElementById(`pu-save-${bar.id}`);
    if (saveBtn) {
      saveBtn.addEventListener('click', async () => {
        if (!pendingBrand) return;
        saveBtn.disabled = true;
        saveBtn.textContent = 'Guardando…';
        try {
          await dbUpdate(bar.id, pendingBrand);
          // Actualiza en memoria
          bar.brand = pendingBrand;
          // Refresca marcador y lista
          if (mkrs[bar.id]) {
            mkrs[bar.id].setIcon(mkIcon(pendingBrand));
            mkrs[bar.id].setPopupContent(puHTML(bar));
            bindPopupEvents(bar, mkrs[bar.id].getPopup());
          }
          renderList();
          renderPills();
          updateStats();
          toast(`✅ Cerveza actualizada — ¡gracias por colaborar!`);
          map.closePopup();
        } catch(e) {
          saveBtn.disabled = false;
          saveBtn.textContent = 'GUARDAR';
          toast('❌ Error al guardar. Inténtalo de nuevo.', true);
        }
      });
    }
  });
}

function renderMkrs() {
  Object.values(mkrs).forEach(m => map.removeLayer(m));
  mkrs = {};
  filtered().forEach(bar => {
    const m = L.marker([bar.lat, bar.lng], { icon: mkIcon(bar.brand) }).addTo(map);
    const popup = L.popup({ maxWidth: 280, minWidth: 260 }).setContent(puHTML(bar));
    m.bindPopup(popup);
    bindPopupEvents(bar, popup);
    m.on('click', () => { selId = bar.id; renderList(); });
    mkrs[bar.id] = m;
  });
  updateStats();
}

// ══════════════════════════════════════════════════════════
// LIST
// ══════════════════════════════════════════════════════════
function renderList() {
  const f = filtered();
  $('sh-cnt').textContent = `${f.length} bares`;
  $('ds-cnt').textContent = f.length;

  const makeCard = bar => {
    const b = getBrand(bar.brand);
    const d = document.createElement('div');
    d.className = `bcard${selId === bar.id ? ' sel' : ''}`;
    d.innerHTML = `
      <div class="bcard-ico" style="background:${b.bg};border:1px solid ${b.c}50;opacity:${bar.brand?1:0.6}">${b.logo(44,28)}</div>
      <div class="bcard-info">
        <div class="bcard-name">${bar.name}</div>
        <div class="bcard-meta">
          <span class="bcard-brand" style="background:${b.bg};color:${b.c}">${b.name}</span>
          <span class="bcard-city">📍 ${bar.city}</span>
        </div>
      </div>`;
    d.addEventListener('click', () => {
      selId = bar.id;
      map.setView([bar.lat, bar.lng], 15);
      if (mkrs[bar.id]) mkrs[bar.id].openPopup();
      renderList();
      if (window.innerWidth < 768) setSheet('mid');
    });
    return d;
  };

  [$('sh-body'), $('ds-list')].forEach(c => {
    if (!c) return;
    c.innerHTML = '';
    if (!f.length) { c.innerHTML = `<div class="no-res"><div class="no-res-ic">🍺</div>Sin resultados con estos filtros</div>`; return; }
    f.forEach(bar => c.appendChild(makeCard(bar)));
  });
}

// ══════════════════════════════════════════════════════════
// PILLS
// ══════════════════════════════════════════════════════════
function renderPills() {
  ['pills-mob', 'pills-ds'].forEach(id => {
    const el = $(id); if (!el) return;
    el.innerHTML = '';

    // Pill especial: sin asignar
    const sinAsignar = dbBars.filter(b => !b.brand).length;
    if (sinAsignar > 0) {
      const on = filters.has('__unknown__');
      const p = document.createElement('div');
      p.className = `pill${on ? ' on' : ''}`;
      p.style.borderColor = on ? '#8A706090' : '';
      p.style.color = on ? '#5A4A3A' : '';
      p.innerHTML = `<div class="pill-logo" style="background:#3A2A1A;border-radius:3px">${UNKNOWN_LOGO(22,14)}</div>Sin marca (${sinAsignar})`;
      p.addEventListener('click', () => {
        filters.has('__unknown__') ? filters.delete('__unknown__') : filters.add('__unknown__');
        renderPills(); renderMkrs(); renderList();
      });
      el.appendChild(p);
    }

    Object.entries(B).forEach(([k, b]) => {
      const on = filters.has(k);
      const p = document.createElement('div');
      p.className = `pill${on ? ' on' : ''}`;
      p.style.borderColor = on ? b.c + '90' : '';
      p.innerHTML = `<div class="pill-logo" style="background:${b.bg};border-radius:3px">${b.logo(22,14)}</div>${b.name}`;
      p.addEventListener('click', () => {
        filters.has(k) ? filters.delete(k) : filters.add(k);
        renderPills(); renderMkrs(); renderList();
      });
      el.appendChild(p);
    });
  });
}

// ══════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════
function updateStats() {
  const f = filtered();
  const brands = new Set(f.map(x => x.brand)).size;
  const cities = new Set(f.map(x => x.city)).size;
  $('sb').textContent = f.length; $('sm').textContent = brands;
  $('ds-sb').textContent = f.length; $('ds-sm').textContent = brands; $('ds-sc').textContent = cities;
}

// ══════════════════════════════════════════════════════════
// BOTTOM SHEET DRAG
// ══════════════════════════════════════════════════════════
function setSheet(s) {
  shState = s; $('sheet').className = `sheet ${s}`;
  const chip = $('stats-chip');
  if (s === 'full') chip.style.bottom = '90vh';
  else if (s === 'mid') chip.style.bottom = '295px';
  else chip.style.bottom = '80px';
}
(function() {
  const h = $('sh-handle'); let sy, st;
  const s = y => { sy = y; st = Date.now(); };
  const e = y => {
    const dy = sy - y, dt = Date.now() - st, fast = dt < 200;
    if (dy > 40 || (fast && dy > 15)) { if (shState === 'peek') setSheet('mid'); else setSheet('full'); }
    else if (dy < -40 || (fast && dy < -15)) { if (shState === 'full') setSheet('mid'); else setSheet('peek'); }
  };
  h.addEventListener('touchstart', ev => s(ev.touches[0].clientY), { passive: true });
  h.addEventListener('touchend', ev => e(ev.changedTouches[0].clientY), { passive: true });
  h.addEventListener('mousedown', ev => { s(ev.clientY); const up = ev2 => { e(ev2.clientY); document.removeEventListener('mouseup', up); }; document.addEventListener('mouseup', up); });
})();

// ══════════════════════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════════════════════
function renderBSel() {
  const el = $('bsel'); el.innerHTML = '';
  Object.entries(B).forEach(([k, b]) => {
    const d = document.createElement('div');
    d.className = `bopt${selBrand === k ? ' sel' : ''}`;
    d.innerHTML = `<div class="bopt-label" style="background:${b.bg}">${b.logo(56, 36)}</div><div class="bopt-nm">${b.name}</div>`;
    d.addEventListener('click', () => { selBrand = k; renderBSel(); $('eb').textContent = ''; });
    el.appendChild(d);
  });
}

function openModal() {
  $('overlay').classList.add('open');
  if (pendLL) { $('flat').value = pendLL.lat.toFixed(5); $('flng').value = pendLL.lng.toFixed(5); }
  setTimeout(() => $('fn').focus(), 300);
}
function closeModal() { $('overlay').classList.remove('open'); resetForm(); }
function resetForm() {
  ['fn', 'fci', 'fad', 'ftg', 'flat', 'flng'].forEach(id => $(id).value = '');
  ['en', 'eb', 'eci', 'eloc'].forEach(id => $(id).textContent = '');
  selBrand = null; renderBSel();
  const btn = $('sub-btn'); btn.disabled = false; $('sub-txt').textContent = 'PUBLICAR BAR';
}
function validate() {
  let ok = true;
  if (!$('fn').value.trim()) { $('en').textContent = 'Nombre obligatorio'; ok = false; }
  if (!selBrand) { $('eb').textContent = 'Selecciona una marca'; ok = false; }
  if (!$('fci').value.trim()) { $('eci').textContent = 'Ciudad obligatoria'; ok = false; }
  const la = parseFloat($('flat').value), ln = parseFloat($('flng').value);
  if (isNaN(la) || isNaN(ln) || la < 27 || la > 44 || ln < -19 || ln > 6) { $('eloc').textContent = 'Ubicación inválida (debe estar en España)'; ok = false; }
  return ok;
}

$('sub-btn').addEventListener('click', async () => {
  if (!validate()) return;
  const btn = $('sub-btn'); btn.disabled = true; $('sub-txt').textContent = 'Guardando…';
  try {
    const payload = {
      nombre: $('fn').value.trim(),
      marca: selBrand,
      ciudad: $('fci').value.trim(),
      direccion: $('fad').value.trim() || null,
      etiquetas: $('ftg').value.split(',').map(t => t.trim()).filter(Boolean),
      lat: parseFloat($('flat').value),
      lng: parseFloat($('flng').value),
    };
    const row = await dbInsert(payload);
    const bar = fromDB(row);
    dbBars.push(bar);
    pendLL = null;
    closeModal();
    renderMkrs(); renderList(); renderPills();
    setTimeout(() => {
      map.setView([bar.lat, bar.lng], 16);
      if (mkrs[bar.id]) mkrs[bar.id].openPopup();
      if (window.innerWidth < 768) setSheet('mid');
    }, 350);
    toast(`✅ ${bar.name} publicado para toda la comunidad`);
  } catch (err) {
    btn.disabled = false; $('sub-txt').textContent = 'PUBLICAR BAR';
    toast('❌ Error al guardar. Inténtalo de nuevo.', true);
    console.error(err);
  }
});

$('geo-btn').addEventListener('click', () => {
  const btn = $('geo-btn'); btn.classList.add('loading'); btn.textContent = '⏳ Obteniendo…';
  navigator.geolocation.getCurrentPosition(
    p => { $('flat').value = p.coords.latitude.toFixed(5); $('flng').value = p.coords.longitude.toFixed(5); btn.classList.remove('loading'); btn.innerHTML = '✅ Ubicación obtenida'; $('eloc').textContent = ''; },
    () => { btn.classList.remove('loading'); btn.innerHTML = '📍 Usar mi ubicación actual'; $('eloc').textContent = 'No se pudo obtener. Introduce las coordenadas o toca el mapa.'; }
  );
});

$('loc-mob').addEventListener('click', () => {
  navigator.geolocation.getCurrentPosition(p => map.setView([p.coords.latitude, p.coords.longitude], 15));
});
$('m-close').addEventListener('click', closeModal);
$('overlay').addEventListener('click', e => { if (e.target === $('overlay')) closeModal(); });
$('add-mob').addEventListener('click', openModal);
$('add-ds').addEventListener('click', openModal);

['sq-mob', 'sq-ds'].forEach(id => {
  const el = $(id); if (!el) return;
  el.addEventListener('input', e => {
    sq = e.target.value;
    ['sq-mob', 'sq-ds'].forEach(s => { const x = $(s); if (x && x !== e.target) x.value = sq; });
    renderMkrs(); renderList();
  });
});

// ══════════════════════════════════════════════════════════
// BOOT — Carga datos de Supabase
// ══════════════════════════════════════════════════════════
async function boot() {
  initMap();
  renderBSel();
  setSheet('mid');

  const ls = $('loading');
  const lsub = ls.querySelector('.loading-sub');
  const lerr = $('loading-err');

  try {
    lsub.textContent = 'Conectando con la base de datos…';

    // Carga paginada — 500 bares por petición para no saturar
    let allRows = [];
    let page = 0;
    const PAGE = 500;
    while (true) {
      lsub.textContent = `Cargando bares… (${allRows.length})`;
      const from = page * PAGE;
      const to = from + PAGE - 1;
      const r = await fetch(
        `${SB_URL}/rest/v1/bares?select=*&order=creado_en.asc&offset=${from}&limit=${PAGE}`,
        { headers: SB_HEADERS }
      );
      if (!r.ok) throw new Error(`Error HTTP ${r.status}: ${await r.text()}`);
      const batch = await r.json();
      allRows = allRows.concat(batch);
      if (batch.length < PAGE) break; // última página
      page++;
    }

    // Si vacía, cargar datos de ejemplo
    if (allRows.length === 0) {
      lsub.textContent = 'Cargando datos iniciales…';
      for (let i = 0; i < SAMPLE_BARS.length; i += 10) {
        await Promise.all(SAMPLE_BARS.slice(i, i + 10).map(bar => dbInsert(bar)));
      }
      const r2 = await fetch(`${SB_URL}/rest/v1/bares?select=*&order=creado_en.asc&limit=500`, { headers: SB_HEADERS });
      allRows = await r2.json();
    }

    dbBars = allRows.map(fromDB);

    // Renderizar en dos pasos: primero pills (rápido), luego markers
    renderPills();
    lsub.textContent = `Pintando ${dbBars.length} bares en el mapa…`;
    await new Promise(r => setTimeout(r, 50)); // cede el hilo al navegador
    renderMkrs();
    renderList();

    // Ocultar pantalla de carga
    ls.classList.add('hidden');
    setTimeout(() => ls.style.display = 'none', 500);

  } catch (err) {
    console.error(err);
    ls.querySelector('.loading-spinner').style.display = 'none';
    lsub.style.display = 'none';
    lerr.style.display = 'block';
    lerr.innerHTML = `⚠️ <strong>Error al cargar</strong><br><br>${err.message}<br><br>
      Posibles causas:<br>
      • La tabla <strong>bares</strong> no existe en Supabase → ejecútala desde SQL Editor<br>
      • Las políticas RLS no están activas<br>
      • Sin conexión a internet<br><br>
      <small style="color:#aaa">Recarga la página para intentarlo de nuevo</small>`;
  }
}

boot();
</script>
